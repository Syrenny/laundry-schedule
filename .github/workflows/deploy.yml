name: Deploy Apps Script

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install sops
        uses: mdgreenwald/mozilla-sops-action@v1

      - name: Restore clasp credentials
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          sops -d secrets/clasp-staging.json.enc > .clasp.json
          sops -d secrets/clasprc.json.enc > ~/.clasprc.json
          sops -d secrets/runtime-secrets.json.enc > runtime-secrets.json

      - name: Install dependencies
        run: npm --prefix web ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: staging

      - name: Push Apps Script
        run: npx @google/clasp push --force

      - name: Prepare runtime secret params
        run: |
          node -e "const fs=require('fs'); const env=process.argv[1]; const secrets=JSON.parse(fs.readFileSync('runtime-secrets.json','utf8')); secrets.APP_ENV=env; fs.writeFileSync('runtime-params.json', JSON.stringify([JSON.stringify(secrets)]));" staging

      - name: Configure runtime secrets
        run: npx @google/clasp run setRuntimeSecretsFromJson --params "$(cat runtime-params.json)"

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install sops
        uses: mdgreenwald/mozilla-sops-action@v1

      - name: Restore clasp credentials
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          sops -d secrets/clasp-production.json.enc > .clasp.json
          sops -d secrets/clasprc.json.enc > ~/.clasprc.json
          sops -d secrets/runtime-secrets.json.enc > runtime-secrets.json

      - name: Install dependencies
        run: npm --prefix web ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: production

      - name: Push Apps Script
        run: npx @google/clasp push --force

      - name: Prepare runtime secret params
        run: |
          node -e "const fs=require('fs'); const env=process.argv[1]; const secrets=JSON.parse(fs.readFileSync('runtime-secrets.json','utf8')); secrets.APP_ENV=env; fs.writeFileSync('runtime-params.json', JSON.stringify([JSON.stringify(secrets)]));" production

      - name: Configure runtime secrets
        run: npx @google/clasp run setRuntimeSecretsFromJson --params "$(cat runtime-params.json)"
