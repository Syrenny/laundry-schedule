name: Deploy Apps Script

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install sops
        uses: mdgreenwald/mozilla-sops-action@v1

      - name: Restore clasp credentials
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          sops -d secrets/clasp-staging.json.enc > .clasp.json
          sops -d secrets/clasprc.json.enc > ~/.clasprc.json

      - name: Build
        run: npm run build

      - name: Push Apps Script
        run: npx --yes @google/clasp push --force

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install sops
        uses: mdgreenwald/mozilla-sops-action@v1

      - name: Restore clasp credentials
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          sops -d secrets/clasp-production.json.enc > .clasp.json
          sops -d secrets/clasprc.json.enc > ~/.clasprc.json

      - name: Build
        run: npm run build

      - name: Push Apps Script
        run: npx --yes @google/clasp push --force
